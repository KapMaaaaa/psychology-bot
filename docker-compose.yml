services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/app.db:/app/app.db
      - ./backend:/app
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    environment:
      # Браузер ходит на тот же хост:3000 → /api/*, Vite проксирует в сервис backend
      - VITE_API_BASE_URL=/api
      - API_PROXY_TARGET=http://backend:8000
    restart: always

volumes:
  frontend_node_modules:
